# mcp-dailyagent — prebuilt-image compose file.
#
# Usage:
#   1. Copy this file to docker-compose.yml
#   2. Copy .env.example to .env and fill in the required values
#   3. docker compose up -d
#
# Update: docker compose pull && docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: dailyagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dailyagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dailyagent}
      POSTGRES_DB: ${POSTGRES_DB:-dailyagent}
    # The app container reaches Postgres over the internal Docker network,
    # so you don't need to publish 5432 on the host. Uncomment only if you
    # want to connect from the host (e.g. with `psql` or a GUI client).
    # ports:
    #   - "127.0.0.1:5432:5432"
    volumes:
      - dailyagent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dailyagent}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    # Tracks the latest build from `main`. Once a semver release (e.g. v1.0.0)
    # is published, you can pin to `:v1` for safe auto-upgrades within a major
    # version, or `:v1.0.0` for an exact pin.
    # Alternatives: docker.io/walrusquant/mcp-dailyagent:latest
    image: ghcr.io/walrusquant/mcp-dailyagent:latest
    container_name: dailyagent-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-dailyagent}:${POSTGRES_PASSWORD:-dailyagent}@postgres:5432/${POSTGRES_DB:-dailyagent}
      SELF_HOSTED_USER_ID: ${SELF_HOSTED_USER_ID}
      SELF_HOSTED_USER_EMAIL: ${SELF_HOSTED_USER_EMAIL:-user@localhost}
      MCP_API_KEY: ${MCP_API_KEY}
      NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Daily Agent MCP}
      NEXT_PUBLIC_SITE_DESCRIPTION: ${NEXT_PUBLIC_SITE_DESCRIPTION:-Your productivity dashboard}
    ports:
      # Localhost by default. If you're fronting this with Tailscale or a reverse
      # proxy, replace "127.0.0.1" with your Tailscale IP (e.g. "100.x.y.z:3000:3000").
      - "127.0.0.1:3000:3000"

volumes:
  dailyagent_pgdata:
