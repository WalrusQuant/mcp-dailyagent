site_name: Daily Agent MCP
site_description: Self-hosted productivity data layer for OpenClaw — typed MCP server + Next.js dashboard over a single Postgres.
site_url: https://dailyagent.dev/docs/
repo_url: https://github.com/WalrusQuant/mcp-dailyagent
repo_name: WalrusQuant/mcp-dailyagent
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

exclude_docs: |
  index.html
  requirements.txt

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.png
  favicon: assets/logo.png
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view

nav:
  - Home: index.md
  - Quick start: quick-start.md
  - Deploying:
      - VPS walkthrough: DEPLOY.md
      - Backup & restore: backup-restore.md
  - Architecture: architecture.md
  - MCP reference: mcp-reference.md
  - OpenClaw integration: openclaw-skill.md
  - Local development: local-development.md
  - Troubleshooting: troubleshooting.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.keys
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/WalrusQuant/mcp-dailyagent
